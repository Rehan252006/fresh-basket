<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders – SMV Daily Needs Anantapur</title>
  <link rel="icon" type="image/png" href="logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="animations.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🛒 SMV Daily Needs</a>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="cart.html" class="nav-link">Cart</a></li>
        <li><a href="orders.html" class="nav-link active">My Orders</a></li>
        <li id="nav-auth"><a href="login.html" class="nav-link">Login</a></li>
      </ul>
      <a href="cart.html" class="cart-btn" id="cart-icon">
        🛍️
        <span class="cart-count" id="cart-count" style="display:none">0</span>
      </a>
    </div>
  </nav>

  <section class="page-header">
    <div class="container">
      <h1 class="page-title fade-up">My Orders 🧾</h1>
      <p class="page-subtitle fade-up">View and manage your orders</p>
    </div>
  </section>

  <div class="container" style="padding:40px 0;">
    <p id="order-message" class="order-message"></p>
    <div id="orders-list" style="max-width:800px;">
      <!-- Orders loaded here -->
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <p class="footer-logo">
            <img src="logo.png" alt="Logo" class="footer-logo-img" />
            SMV Daily Needs
          </p>
          <p class="footer-tagline">Your daily essentials, delivered with love in Anantapur.</p>
        </div>
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="cart.html">Cart</a>
          <a href="orders.html">My Orders</a>
        </div>
      </div>
      <p class="footer-copy">&copy; 2026 SMV Daily Needs – Anantapur. All rights reserved.</p>
    </div>
  </footer>

  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="cart.js"></script>
  <script src="whatsapp.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const profile = await requireLogin();
      setupNavbar();
      await loadCustomerOrders(profile.id);
    });

    async function loadCustomerOrders(customerId) {
      const list = document.getElementById("orders-list");
      list.innerHTML = `<p class="loading-text">Loading your orders...</p>`;

      const { data: orders, error } = await window.sb
        .from("orders")
        .select("*")
        .eq("customer_id", customerId)
        .order("created_at", { ascending: false });

      if (error) {
        list.innerHTML = `<p class="error-msg">Failed to load orders.</p>`;
        return;
      }

      if (orders.length === 0) {
        list.innerHTML = `<p class="empty-msg">You haven't placed any orders yet. <a href="index.html">Start shopping!</a></p>`;
        return;
      }

      list.innerHTML = "";
      orders.forEach((order) => {
        const card = createOrderCard(order, customerId);
        list.appendChild(card);
      });
    }

    function createOrderCard(order, customerId) {
      const card = document.createElement("div");
      card.className = "section-card fade-up";
      card.style.marginBottom = "16px";

      const date = new Date(order.created_at).toLocaleString("en-IN");
      const itemsList = order.items
        .map((item) => `<li>${item.name} x${item.qty} — ₹${(item.price * item.qty).toFixed(2)}</li>`)
        .join("");

      const canCancel = order.status === "pending" || order.status === "confirmed";
      const cancelBtn = canCancel
        ? `<button class="btn-delete" onclick="cancelOrder('${order.id}')">Cancel Order</button>`
        : "";

      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;">
          <div>
            <p style="font-weight:700;color:var(--primary);margin:0;"><strong>#${order.id.slice(0, 8).toUpperCase()}</strong></p>
            <p style="font-size:0.85rem;color:var(--text-muted);margin:4px 0 0;">${date}</p>
          </div>
          <span style="background:var(--bg);padding:4px 12px;border-radius:var(--radius-pill);font-size:0.8rem;font-weight:600;color:var(--primary);">${order.status}</span>
        </div>

        <div style="margin:12px 0;">
          <p style="font-size:0.9rem;font-weight:500;margin:0 0 6px;"><strong>Items:</strong></p>
          <ul style="font-size:0.85rem;color:var(--text-muted);margin:0;padding-left:16px;line-height:1.8;">${itemsList}</ul>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:0.5px solid var(--border);">
          <div>
            <p style="font-size:0.8rem;color:var(--text-muted);margin:0;">Total</p>
            <p style="font-size:1.2rem;font-weight:700;color:var(--primary);margin:4px 0 0;">₹${Number(order.total).toFixed(2)}</p>
          </div>
          ${cancelBtn}
        </div>
      `;

      return card;
    }

    async function cancelOrder(orderId) {
      const confirmed = confirm("Are you sure you want to cancel this order?");
      if (!confirmed) return;

      // Fetch order details for WhatsApp notification
      const { data: orderData, error: fetchError } = await window.sb
        .from("orders")
        .select("*")
        .eq("id", orderId)
        .single();

      if (fetchError) {
        showOrderError("Failed to fetch order details for cancellation.");
        return;
      }

      const { error } = await window.sb
        .from("orders")
        .update({ status: "cancelled" })
        .eq("id", orderId);

      if (error) {
        showOrderError("Failed to cancel order.");
        return;
      }

      // Notify admins
      if (typeof notifyAdminsCancel === "function") {
        notifyAdminsCancel({
          orderId: orderData.id,
          name: orderData.customer_name,
          phone: orderData.customer_phone
        });
      }

      showOrderSuccess("Order cancelled successfully!");
      setTimeout(() => location.reload(), 1500);
    }

    function showOrderError(msg) {
      const el = document.getElementById("order-message");
      if (!el) return;
      el.textContent = msg;
      el.className = "order-message error";
    }

    function showOrderSuccess(msg) {
      const el = document.getElementById("order-message");
      if (!el) return;
      el.textContent = msg;
      el.className = "order-message success";
    }

    function toggleMenu() {
      document.getElementById("nav-links").classList.toggle("open");
      document.getElementById("hamburger").classList.toggle("open");
    }
  </script>

</body>

</html>
