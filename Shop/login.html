<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – SMV Daily Needs Anantapur</title>
  <link rel="icon" type="image/png" href="logo.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="animations.css"/>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

  <!-- ── NAVBAR ───────────────────────────────────────── -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🛒 SMV Daily Needs</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="cart.html" class="nav-link">Cart</a></li>
        <li><a href="orders.html" class="nav-link">My Orders</a></li>
        <li id="nav-auth"><a href="login.html" class="nav-link">Login</a></li>
      </ul>
      <a href="cart.html" class="cart-btn" id="cart-icon">
        🛍️
        <span class="cart-count" id="cart-count" style="display:none">0</span>
      </a>
    </div>
  </nav>

  <!-- ── AUTH CARD ─────────────────────────────────────── -->
  <div class="auth-wrapper">
    <div class="auth-card fade-up">

      <!-- Logo -->
      <div class="auth-logo">
        <img src="logo.png" alt="Logo" class="auth-logo-img" />
      </div>
      <h1 class="auth-brand">SMV Daily Needs</h1>
      <h2 class="auth-title" id="auth-title">Welcome Back</h2>

      <!-- Message (error / success) -->
      <p class="auth-message" id="auth-message"></p>

      <!-- ── LOGIN FORM ──────────────────────────────── -->
      <form
        id="login-form"
        class="auth-form"
        onsubmit="handleLogin(event)"
        style="display:flex"
      >
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input
            type="email"
            id="login-email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="login-password"
              placeholder="Enter your password"
              required
            />
            <button
              type="button"
              class="toggle-password"
              onclick="togglePassword('login-password')"
            >👁️</button>
          </div>
        </div>

        <button type="submit" class="btn-primary btn-full">
          Login
        </button>

        <p class="auth-switch">
          Don't have an account?
          <button type="button" class="btn-link" onclick="switchToSignup()">
            Sign Up
          </button>
        </p>
      </form>

      <!-- ── SIGNUP FORM ─────────────────────────────── -->
      <form
        id="signup-form"
        class="auth-form"
        onsubmit="handleSignup(event)"
        style="display:none"
      >
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input
            type="text"
            id="signup-name"
            placeholder="Your full name"
            required
          />
        </div>

        <div class="form-group">
          <label for="signup-phone">Phone Number</label>
          <input
            type="tel"
            id="signup-phone"
            placeholder="10-digit mobile number"
            maxlength="10"
            required
          />
        </div>

        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input
            type="email"
            id="signup-email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="signup-password"
              placeholder="Minimum 6 characters"
              minlength="6"
              required
            />
            <button
              type="button"
              class="toggle-password"
              onclick="togglePassword('signup-password')"
            >👁️</button>
          </div>
        </div>

        <button type="submit" class="btn-primary btn-full">
          Create Account
        </button>

        <p class="auth-switch">
          Already have an account?
          <button type="button" class="btn-link" onclick="switchToLogin()">
            Login
          </button>
        </p>
      </form>

    </div>
  </div>

  <!-- ── FOOTER ────────────────────────────────────────── -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <p class="footer-logo">
            <img src="logo.png" alt="Logo" class="footer-logo-img" />
            SMV Daily Needs
          </p>
        </div>
      </div>
      <p class="footer-copy">&copy; 2026 SMV Daily Needs – Anantapur. All rights reserved.</p>
    </div>
  </footer>

  <!-- ── SCRIPTS ───────────────────────────────────────── -->
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="cart.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      updateCartCount();

      // If already logged in redirect away from login page
      window.sb.auth.getUser().then(({ data: { user } }) => {
        if (user) {
          window.sb
            .from("profiles")
            .select("role")
            .eq("id", user.id)
            .single()
            .then(({ data: profile }) => {
              if (profile && profile.role === "admin") {
                window.location.href = "admin.html";
              } else {
                window.location.href = "index.html";
              }
            });
        }
      });
    });

    // Handle login form submit
    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      login(email, password);
    }

    // Handle signup form submit
    function handleSignup(event) {
      event.preventDefault();
      const name = document.getElementById("signup-name").value.trim();
      const phone = document.getElementById("signup-phone").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      signup(name, phone, email, password);
    }

    // Show or hide password
    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      input.type = input.type === "password" ? "text" : "password";
    }
  </script>

</body>
</html>
