<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – Fresh Basket Anantapur</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="animations.css"/>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-page">

  <!-- ── NEW ORDER BANNER (injected by admin.js) ───────── -->
  <!-- Dynamically added here by showNewOrderBanner() -->

  <!-- ── NAVBAR ───────────────────────────────────────── -->
  <nav class="navbar admin-navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🛒 Fresh Basket</a>
      <div class="admin-nav-right">
        <span class="admin-badge">Admin Panel</span>
        <span class="nav-username" id="admin-name"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <!-- ── ADMIN HEADER ──────────────────────────────────── -->
  <section class="admin-header">
    <div class="container">
      <h1 class="admin-title fade-up">Dashboard</h1>
      <p class="admin-subtitle fade-up">Manage your products and orders</p>
    </div>
  </section>

  <!-- ── ADMIN MESSAGE ─────────────────────────────────── -->
  <div class="container">
    <p id="admin-message" class="admin-message"></p>
  </div>

  <!-- ── TABS ──────────────────────────────────────────── -->
  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="products-tab">
        📦 Products
      </button>
      <button class="tab-btn" data-tab="orders-tab">
        🧾 Orders
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- PRODUCTS TAB                                       -->
  <!-- ══════════════════════════════════════════════════ -->
  <div class="container tab-panel active" id="products-tab">

    <!-- Add / Edit product form -->
    <div class="section-card">
      <h2 class="section-card-title" id="product-form-title">Add New Product</h2>

      <form id="product-form" class="product-form">

        <div class="form-row">
          <div class="form-group">
            <label for="product-name">Product Name *</label>
            <input
              type="text"
              id="product-name"
              placeholder="e.g. Fresh Tomatoes"
              required
            />
          </div>

          <div class="form-group">
            <label for="product-price">Price (₹) *</label>
            <input
              type="number"
              id="product-price"
              placeholder="e.g. 40"
              min="0"
              step="0.01"
              required
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="product-category">Category *</label>
            <select id="product-category" required>
              <option value="">Select category</option>
              <option value="Vegetables">🥦 Vegetables</option>
              <option value="Dairy">🥛 Dairy</option>
              <option value="Snacks">🍿 Snacks</option>
              <option value="Beverages">🧃 Beverages</option>
              <option value="Grocery">📦 Grocery</option>
            </select>
          </div>

          <div class="form-group">
            <label for="product-image">Image URL</label>
            <input
              type="url"
              id="product-image"
              placeholder="https://example.com/image.jpg"
            />
          </div>
        </div>

        <div class="form-group form-check">
          <input
            type="checkbox"
            id="product-available"
            checked
          />
          <label for="product-available">Available for sale</label>
        </div>

        <div class="form-actions">
          <button
            type="submit"
            class="btn-primary"
            id="product-submit-btn"
          >
            Add Product
          </button>
          <button
            type="button"
            class="btn-secondary"
            id="cancel-edit-btn"
            onclick="cancelEdit()"
            style="display:none"
          >
            Cancel Edit
          </button>
        </div>

      </form>
    </div>

    <!-- Product list -->
    <div class="section-card">
      <div class="section-card-header">
        <h2 class="section-card-title">All Products</h2>
        <button class="btn-refresh" onclick="loadAdminProducts()">
          🔄 Refresh
        </button>
      </div>
      <div id="admin-product-list">
        <!-- Rendered by admin.js -->
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- ORDERS TAB                                         -->
  <!-- ══════════════════════════════════════════════════ -->
  <div class="container tab-panel" id="orders-tab">

    <div class="section-card">
      <div class="section-card-header">
        <h2 class="section-card-title">All Orders</h2>
        <div class="orders-header-right">
          <span class="realtime-badge">🟢 Live</span>
          <button class="btn-refresh" onclick="loadAdminOrders()">
            🔄 Refresh
          </button>
        </div>
      </div>

      <!-- Order status filter -->
      <div class="order-filters">
        <button class="filter-btn active" onclick="filterOrders('all', this)">All</button>
        <button class="filter-btn" onclick="filterOrders('pending', this)">Pending</button>
        <button class="filter-btn" onclick="filterOrders('confirmed', this)">Confirmed</button>
        <button class="filter-btn" onclick="filterOrders('out for delivery', this)">Out for Delivery</button>
        <button class="filter-btn" onclick="filterOrders('delivered', this)">Delivered</button>
      </div>

      <div id="admin-order-list">
        <!-- Rendered by admin.js -->
      </div>
    </div>

  </div>

  <!-- ── FOOTER ────────────────────────────────────────── -->
  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; 2026 Fresh Basket – Anantapur. All rights reserved.</p>
    </div>
  </footer>

  <!-- ── SCRIPTS ───────────────────────────────────────── -->
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="admin.js"></script>
  <script>
    // Filter orders by status
    function filterOrders(status, btn) {
      document.querySelectorAll(".order-filters .filter-btn").forEach((b) =>
        b.classList.remove("active")
      );
      btn.classList.add("active");

      const cards = document.querySelectorAll(".order-card");
      cards.forEach((card) => {
        const select = card.querySelector(".status-select");
        if (!select) return;
        if (status === "all" || select.value === status) {
          card.style.display = "block";
        } else {
          card.style.display = "none";
        }
      });
    }
  </script>

</body>
</html>
